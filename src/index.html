<!DOCTYPE html>
<html
  lang="en"
  class="scroll-smooth"
  x-data
  :class="$store.window.isRetina ? 'antialiased' : 'subpixel-antialiased'"
  x-init="$store.window.onLoad()"
  @resize.window="$store.window.onResize()"
  @scroll.window="$store.window.onScroll()">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#C0D8CC" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="shortcut icon" type="image/png" href="./images/favicon.png" />
    <title>Steven Excelmans</title>
  </head>
  <body class="bg-baby-powder">
    <!-- section - header -->
    <header class="sticky top-0 z-50 h-20 bg-opal text-independence" x-data="{open: false}" x-on:keydown.escape="open = false">
      <div class="relative flex h-full w-full items-center justify-between px-4 text-lg sm:px-6 md:px-8 md:text-2xl">
        <h1 class="z-50 cursor-default font-poppins font-extralight uppercase tracking-tight" :class="open ? 'text-baby-powder' : ''">
          Steven <span class="inline-block -translate-x-0.5 font-medium">Excelmans</span>
        </h1>
        <div class="hidden space-x-6 font-poppins font-thin md:flex">
          <a href="#about" class="header-link group">About<span class="header-link__underline"></span></a>
        </div>
        <button class="hamburger z-30 block focus:outline-none md:hidden" x-on:click="open = !open" :class="open ? 'open': ''">
          <span class="hamburger-top"></span>
          <span class="hamburger-middle"></span>
          <span class="hamburger-bottom"></span>
        </button>
        <div
          x-show="open"
          x-transition:enter="transition ease-linear duration-300 transform"
          x-transition:enter-start="translate-x-full"
          x-transition:enter-end="translate-x-0"
          x-transition:leave="transition ease-out duration-150 transform"
          x-transition:leave-start="translate-x-0"
          x-transition:leave-end="translate-x-full"
          class="fixed absolute inset-0 z-20 flex h-full min-h-screen w-full flex-col items-center divide-y divide-baby-powder self-end bg-steel-teal px-4 py-1 pt-24 pb-4 font-poppins font-light uppercase lowercase tracking-widest text-baby-powder opacity-95 sm:px-6 md:px-8">
          <div class="w-full py-3 text-center" x-on:click="open = !open">
            <a href="#about" class="block hover:text-green-sheen">about</a>
          </div>
        </div>
      </div>
    </header>

    <!-- section - hero -->
    <section id="hero" class="hero">
      <div class="hero__text flex h-full flex-col items-center justify-center space-y-4 text-independence transition-all">
        <h1 class="relative font-poppins text-4xl sm:text-5xl md:text-7xl">
          Hi, I&apos;m <span class="font-bold text-steel-teal">Steven</span>!
        </h1>
        <div class="text-xl font-thin sm:text-2xl md:text-4xl">
          <div class="inline-block">
            <div class="hero__typing">I'm a web developer and coach&nbsp;</div>
          </div>
        </div>
      </div>
      <span class="hero__skew-left"></span>
      <span class="hero__skew-right"></span>
    </section>

    <!--section - about-->
    <section id="about">
      <div class="h-screen w-screen py-24 px-8">
        <div class="flex items-center justify-center">
          <h1 class="font-poppins text-4xl font-thin">work in progress ...</h1>
        </div>
      </div>
    </section>
  </body>
</html>
